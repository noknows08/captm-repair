<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>CAPTM Repair — Admin</title>
<style>
:root{
  --paper:#f7f9fa; --surface:#fff; --ink:#16262d; --text:#2c3e46;
  --muted:#5b6e76; --line:#dfe7ea; --accent:#0e7490; --accent-ink:#0a5769;
  --danger:#b3423a; --ok:#2c7a4b;
}
*,*::before,*::after{ box-sizing:border-box; }
body{
  margin:0; background:var(--paper); color:var(--text);
  font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
  font-size:16px; line-height:1.6;
}
.wrap{ width:min(760px, 100% - 2rem); margin:0 auto; padding:2.5rem 0 4rem; }
h1{ font-size:1.5rem; color:var(--ink); margin:0 0 .2em; }
h2{ font-size:1.05rem; color:var(--ink); margin:0 0 .8em; }
.sub{ color:var(--muted); font-size:.92rem; margin:0 0 2rem; }
.sub a{ color:var(--accent); }
.card{
  background:var(--surface); border:1px solid var(--line);
  border-radius:12px; padding:1.6rem; margin-bottom:1.2rem;
}
label{ display:block; font-weight:600; color:var(--ink); font-size:.88rem; margin:0 0 .35em; }
input[type=email], input[type=password], input[type=text]{
  width:100%; padding:.7em .9em; margin-bottom:1rem;
  border:1px solid var(--line); border-radius:8px;
  font:inherit; color:var(--text); background:#fff;
}
input:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }
.btn{
  display:inline-flex; align-items:center; gap:.5em;
  font:inherit; font-weight:600; font-size:.92rem;
  padding:.7em 1.4em; border-radius:8px; border:1px solid transparent;
  cursor:pointer; background:var(--accent); color:#fff;
}
.btn:hover{ background:var(--accent-ink); }
.btn[disabled]{ opacity:.55; cursor:not-allowed; }
.btn-quiet{ background:transparent; color:var(--muted); border-color:var(--line); }
.btn-quiet:hover{ background:var(--paper); color:var(--ink); }
.btn-danger{ background:transparent; color:var(--danger); border-color:var(--line); padding:.4em .8em; font-size:.8rem; }
.btn-danger:hover{ background:#faf0ef; border-color:var(--danger); }
.row{ display:flex; gap:.8rem; align-items:center; flex-wrap:wrap; }
.status{ font-size:.88rem; margin-top:.9rem; min-height:1.3em; }
.status.err{ color:var(--danger); }
.status.ok{ color:var(--ok); }
.hidden{ display:none; }
.topbar{ display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:1.6rem; }
.who{ font-size:.85rem; color:var(--muted); }
.drop{
  border:2px dashed var(--line); border-radius:10px;
  padding:1.4rem; text-align:center; color:var(--muted);
  font-size:.92rem; margin-bottom:1rem; background:var(--paper);
}
.drop.on{ border-color:var(--accent); color:var(--accent); }
.gal{ display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:.8rem; }
.gal figure{
  margin:0; border:1px solid var(--line); border-radius:10px;
  overflow:hidden; background:var(--surface);
}
.gal img{ display:block; width:100%; aspect-ratio:4/3; object-fit:cover; }
.gal figcaption{ padding:.5rem .6rem; font-size:.78rem; color:var(--muted); display:flex; justify-content:space-between; gap:.5rem; align-items:center; }
.gal figcaption span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
</head>
<body>
<div class="wrap">
  <h1>CAPTM Repair — Admin</h1>
  <p class="sub">Upload photos of finished work — they appear instantly in the
     <a href="./#gallery">site gallery</a>, newest first.</p>

  <!-- login -->
  <div class="card" id="login-card">
    <h2>Sign in</h2>
    <form id="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="username" required>
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
      <div class="row">
        <button class="btn" type="submit" id="login-btn">Sign in</button>
        <button class="btn btn-quiet" type="button" id="signup-btn">First time? Create admin account</button>
      </div>
      <p class="status" id="login-status" role="status"></p>
    </form>
  </div>

  <!-- panel -->
  <div class="hidden" id="panel">
    <div class="topbar">
      <span class="who" id="who"></span>
      <button class="btn btn-quiet" type="button" id="logout-btn">Sign out</button>
    </div>

    <div class="card">
      <h2>Upload photos</h2>
      <div class="drop" id="drop">Drop images here, or use the picker below. JPG/PNG/WebP, up to 8 MB each.</div>
      <label for="files">Choose images</label>
      <input type="file" id="files" accept="image/jpeg,image/png,image/webp" multiple>
      <label for="caption">Caption (shown on the photo, applied to this batch)</label>
      <input type="text" id="caption" maxlength="60" placeholder="e.g. SSD upgrade — done today">
      <button class="btn" type="button" id="upload-btn">Upload to gallery</button>
      <p class="status" id="upload-status" role="status"></p>
    </div>

    <div class="card">
      <h2>Photos in the gallery</h2>
      <div class="gal" id="admin-gal"></div>
      <p class="status" id="gal-status" role="status"></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function(){
  "use strict";
  var SUPABASE_URL = "https://ypmwaaeqztxadlfxuebk.supabase.co";
  var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwbXdhYWVxenR4YWRsZnh1ZWJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwODU3NDAsImV4cCI6MjA5ODY2MTc0MH0.tl7LC9VCNwYN66SIEK2Q_IUrZSOR5yVd5vKRn4isSuM";
  var BUCKET = "captm-gallery";
  if (!window.supabase) { document.getElementById("login-status").textContent = "Could not load Supabase library — check your connection."; return; }
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  var loginCard = document.getElementById("login-card");
  var panel = document.getElementById("panel");
  var who = document.getElementById("who");
  var loginStatus = document.getElementById("login-status");
  var upStatus = document.getElementById("upload-status");
  var galStatus = document.getElementById("gal-status");
  var adminGal = document.getElementById("admin-gal");
  var filesInput = document.getElementById("files");
  var drop = document.getElementById("drop");
  var pendingFiles = [];

  function setStatus(el, msg, kind){ el.textContent = msg || ""; el.className = "status" + (kind ? " " + kind : ""); }

  function publicUrl(path){
    return SUPABASE_URL + "/storage/v1/object/public/" + BUCKET + "/" + encodeURIComponent(path);
  }

  function show(user){
    loginCard.classList.add("hidden");
    panel.classList.remove("hidden");
    who.textContent = "Signed in as " + user.email;
    refreshGallery();
  }
  function hide(){
    panel.classList.add("hidden");
    loginCard.classList.remove("hidden");
  }

  sb.auth.getSession().then(function(res){
    if (res.data && res.data.session) show(res.data.session.user);
  });

  document.getElementById("login-form").addEventListener("submit", function(e){
    e.preventDefault();
    setStatus(loginStatus, "Signing in…");
    sb.auth.signInWithPassword({
      email: document.getElementById("email").value.trim(),
      password: document.getElementById("password").value
    }).then(function(res){
      if (res.error) { setStatus(loginStatus, res.error.message, "err"); return; }
      setStatus(loginStatus, "");
      show(res.data.user);
    });
  });

  document.getElementById("logout-btn").addEventListener("click", function(){
    sb.auth.signOut().then(hide);
  });

  /* one-time account creation, locked to the gallery admin email */
  var ADMIN_EMAIL = "bibisheila08@gmail.com";
  document.getElementById("signup-btn").addEventListener("click", function(){
    var email = document.getElementById("email").value.trim().toLowerCase();
    var password = document.getElementById("password").value;
    if (email !== ADMIN_EMAIL) { setStatus(loginStatus, "Account creation is only for " + ADMIN_EMAIL + ".", "err"); return; }
    if (password.length < 8) { setStatus(loginStatus, "Choose a password of at least 8 characters.", "err"); return; }
    setStatus(loginStatus, "Creating account…");
    sb.auth.signUp({ email: email, password: password }).then(function(res){
      if (res.error) { setStatus(loginStatus, res.error.message, "err"); return; }
      if (res.data && res.data.user) {
        setStatus(loginStatus, "Account created — signing you in…", "ok");
        sb.auth.signInWithPassword({ email: email, password: password }).then(function(res2){
          if (res2.error) { setStatus(loginStatus, res2.error.message, "err"); return; }
          show(res2.data.user);
        });
      }
    });
  });

  ["dragover","dragenter"].forEach(function(ev){
    drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.add("on"); });
  });
  ["dragleave","drop"].forEach(function(ev){
    drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.remove("on"); });
  });
  drop.addEventListener("drop", function(e){
    if (e.dataTransfer && e.dataTransfer.files.length) {
      pendingFiles = Array.prototype.slice.call(e.dataTransfer.files);
      drop.textContent = pendingFiles.length + " image(s) ready — press “Upload to gallery”.";
    }
  });
  filesInput.addEventListener("change", function(){
    pendingFiles = Array.prototype.slice.call(filesInput.files);
  });

  document.getElementById("upload-btn").addEventListener("click", function(){
    var files = pendingFiles;
    var caption = document.getElementById("caption").value.trim();
    if (!files.length) { setStatus(upStatus, "Pick at least one image first.", "err"); return; }
    var okTypes = ["image/jpeg","image/png","image/webp"];
    var btn = this;
    btn.disabled = true;
    var done = 0, failed = 0;

    function next(i){
      if (i >= files.length) {
        btn.disabled = false;
        pendingFiles = [];
        filesInput.value = "";
        drop.textContent = "Drop images here, or use the picker below. JPG/PNG/WebP, up to 8 MB each.";
        setStatus(upStatus, done + " uploaded" + (failed ? ", " + failed + " failed" : "") + ".", failed ? "err" : "ok");
        refreshGallery();
        return;
      }
      var f = files[i];
      if (okTypes.indexOf(f.type) === -1 || f.size > 8 * 1024 * 1024) {
        failed++; next(i + 1); return;
      }
      setStatus(upStatus, "Uploading " + (i + 1) + " of " + files.length + "…");
      var ext = f.name.split(".").pop().toLowerCase().replace(/[^a-z0-9]/g, "") || "jpg";
      var path = Date.now() + "-" + Math.random().toString(36).slice(2, 8) + "." + ext;
      sb.storage.from(BUCKET).upload(path, f, { contentType: f.type }).then(function(res){
        if (res.error) { failed++; next(i + 1); return; }
        sb.from("captm_gallery").insert({ path: path, caption: caption || null }).then(function(res2){
          if (res2.error) {
            failed++;
            sb.storage.from(BUCKET).remove([path]);
          } else {
            done++;
          }
          next(i + 1);
        });
      });
    }
    next(0);
  });

  function refreshGallery(){
    setStatus(galStatus, "Loading…");
    sb.from("captm_gallery").select("id,path,caption,created_at").order("created_at", { ascending: false }).then(function(res){
      adminGal.innerHTML = "";
      if (res.error) { setStatus(galStatus, res.error.message, "err"); return; }
      if (!res.data.length) { setStatus(galStatus, "No uploaded photos yet — the site shows its built-in six."); return; }
      setStatus(galStatus, "");
      res.data.forEach(function(row){
        var fig = document.createElement("figure");
        var img = document.createElement("img");
        img.src = publicUrl(row.path);
        img.alt = row.caption || "Gallery photo";
        img.loading = "lazy";
        var cap = document.createElement("figcaption");
        var span = document.createElement("span");
        span.textContent = row.caption || "(no caption)";
        var del = document.createElement("button");
        del.className = "btn-danger btn";
        del.type = "button";
        del.textContent = "Delete";
        del.addEventListener("click", function(){
          if (!window.confirm("Delete this photo from the gallery?")) return;
          sb.from("captm_gallery").delete().eq("id", row.id).then(function(res2){
            if (res2.error) { setStatus(galStatus, res2.error.message, "err"); return; }
            sb.storage.from(BUCKET).remove([row.path]).then(refreshGallery);
          });
        });
        cap.appendChild(span);
        cap.appendChild(del);
        fig.appendChild(img);
        fig.appendChild(cap);
        adminGal.appendChild(fig);
      });
    });
  }
})();
</script>
</body>
</html>
